<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ডিপোজিট রিভিউ - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans pb-12">

  <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-40">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <a href="/admin" class="text-xs text-amber-400 font-bold flex items-center gap-1.5"><i class="fa-solid fa-arrow-left"></i> ব্যাক টু এডমিন</a>
      <h1 class="text-sm font-black text-white">💰 পেন্ডিং ডিপোজিট রিকোয়েস্টসমূহ</h1>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto p-4 space-y-6">
    <section class="bg-slate-900 border border-slate-800 p-6 rounded-3xl space-y-4">
      <div class="flex justify-between items-center border-b border-slate-800 pb-3">
        <h2 class="text-sm font-bold text-emerald-400 flex items-center gap-2"><i class="fa-solid fa-wallet"></i> ডিপোজিট তালিকা</h2>
        <span id="pendingBadge" class="bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 text-xs px-2.5 py-0.5 rounded-full font-bold">০টি</span>
      </div>

      <div id="pendingDepositList" class="space-y-4">
        <p class="text-xs text-slate-500 text-center py-6">লোডিং হচ্ছে...</p>
      </div>
    </section>
  </main>

  <script>
    function getAdminHeader() {
      return {
        'Content-Type': 'application/json',
        'Authorization': localStorage.getItem('adminToken') || ''
      };
    }

    async function loadPendingDeposits() {
      const container = document.getElementById('pendingDepositList');
      const badge = document.getElementById('pendingBadge');

      const res = await fetch('/api/admin/pending-deposits', { headers: getAdminHeader() });
      const data = await res.json();

      if (data.status === 'success' && data.deposits.length > 0) {
        badge.innerText = `${data.deposits.length}টি`;
        container.innerHTML = data.deposits.map(d => `
          <div id="card_${d.id}" class="bg-slate-950 border border-slate-800 p-5 rounded-2xl space-y-3 transition-all duration-300">
            <div class="flex justify-between items-start flex-wrap gap-2 border-b border-slate-800 pb-2">
              <div>
                <h3 class="text-sm font-bold text-white">${d.userName}</h3>
                <p class="text-xs text-slate-400">ফোন: <b class="text-slate-200">${d.userPhone}</b></p>
              </div>
              <span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 text-xs px-2.5 py-1 rounded-full font-black">৳${d.amount}</span>
            </div>
            <div class="grid grid-cols-2 gap-2 text-xs text-slate-300 bg-slate-900/60 p-3 rounded-xl border border-slate-800">
              <p>মেথড: <b class="text-amber-400">${d.method}</b></p>
              <p>প্রেরক নম্বর: <b class="text-indigo-300">${d.senderNumber}</b></p>
              <p class="col-span-2">TrxID: <b class="text-emerald-300 font-mono select-all">${d.trxId}</b></p>
              <p class="text-[11px] text-slate-500 col-span-2">তারিখ: ${d.date}</p>
            </div>
            <div class="flex gap-2 pt-1">
              <button onclick="reviewDeposit('${d.id}', 'Approved')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-xl text-xs transition">Confirm & Add Money</button>
              <button onclick="reviewDeposit('${d.id}', 'Rejected')" class="bg-rose-600 hover:bg-rose-500 text-white font-bold px-5 py-2.5 rounded-xl text-xs transition">Reject</button>
            </div>
          </div>
        `).join('');
      } else {
        badge.innerText = '০টি';
        container.innerHTML = '<p class="text-center py-6 text-slate-500 text-xs">কোনো ডিপোজিট রিকোয়েস্ট নেই!</p>';
      }
    }

    async function reviewDeposit(id, status) {
      const res = await fetch('/api/admin/review-deposit', {
        method: 'POST',
        headers: getAdminHeader(),
        body: JSON.stringify({ id, status })
      });
      const data = await res.json();
      if (data.status === 'success') {
        const card = document.getElementById(`card_${id}`);
        if (card) {
          card.style.opacity = '0';
          card.style.transform = 'scale(0.9)';
          setTimeout(() => { card.remove(); loadPendingDeposits(); }, 300);
        }
      }
    }

    loadPendingDeposits();
  </script>
</body>
</html>
