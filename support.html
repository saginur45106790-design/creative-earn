<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Chat - CreativeEarn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .chat-bubble-user { background: linear-gradient(135deg, #0084ff, #00c6ff); border-radius: 18px 18px 4px 18px; }
    .chat-bubble-admin { background-color: #242526; border-radius: 18px 18px 18px 4px; }
  </style>
</head>
<body class="bg-[#0F172A] text-slate-100 h-screen flex flex-col font-sans overflow-hidden">

  <!-- হেডার (টিকিট নম্বর সহ) -->
  <header class="bg-slate-900 border-b border-slate-800 px-4 py-3 flex items-center justify-between shrink-0 shadow-md z-20">
    <div class="flex items-center gap-3">
      <a href="/dashboard" class="text-slate-400 hover:text-white text-lg mr-1"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="relative">
        <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-white shadow-md">S</div>
        <span class="w-3 h-3 bg-emerald-500 rounded-full absolute bottom-0 right-0 border-2 border-slate-900"></span>
      </div>
      <div>
        <h2 class="text-xs font-bold text-white flex items-center gap-1.5">CreativeEarn Support <i class="fa-solid fa-circle-check text-blue-500 text-[11px]"></i></h2>
        <span class="text-[10px] text-emerald-400">Live Agent Transfer • Encrypted</span>
      </div>
    </div>
    <div class="text-right">
      <span id="ticketBadge" class="bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 text-[10px] px-2 py-0.5 rounded-full font-mono font-bold">#SUP-10458</span>
    </div>
  </header>

  <!-- চ্যাট এলাকা -->
  <main id="chatBody" class="flex-1 min-h-0 p-4 overflow-y-auto space-y-3 bg-slate-950">
  </main>

  <!-- 🟢 ১০০% ভিজিবল ফিক্সড ইনপুট বার -->
  <footer class="bg-slate-900 border-t border-slate-800 p-3 shrink-0 relative z-30">
    <form onsubmit="sendChatMessage(event)" class="flex items-center gap-2">
      <label class="bg-slate-800 hover:bg-slate-700 text-indigo-400 p-2.5 rounded-full cursor-pointer transition shrink-0 flex items-center justify-center border border-slate-700">
        <i class="fa-solid fa-image text-sm"></i>
        <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewSelectedImage(this)">
      </label>

      <input type="text" id="chatInput" placeholder="Aa মেসেজ লিখুন..." class="flex-grow bg-slate-950 text-xs p-3 rounded-full border border-slate-800 text-slate-200 focus:outline-none focus:border-indigo-500">
      
      <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white w-9 h-9 rounded-full flex items-center justify-center shrink-0 text-sm transition shadow-md">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </form>
    <p id="imagePreviewText" class="text-[10px] text-amber-400 font-semibold mt-1 hidden text-center"></p>
  </footer>

  <script>
    let selectedImageBase64 = null;

    function previewSelectedImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          selectedImageBase64 = e.target.result;
          const p = document.getElementById('imagePreviewText');
          p.innerText = "📷 স্ক্রিনশট যুক্ত করা হয়েছে! 'Send' এ চাপুন।";
          p.classList.remove('hidden');
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function loadMessages() {
      try {
        const res = await fetch('/api/support/messages');
        const data = await res.json();
        if (data.status === 'success') {
          const body = document.getElementById('chatBody');
          body.innerHTML = data.messages.map(m => {
            const isUser = m.sender === 'user';
            if (m.ticket) document.getElementById('ticketBadge').innerText = m.ticket;

            return `
              <div class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                <div class="${isUser ? 'chat-bubble-user text-white' : 'chat-bubble-admin text-slate-200 border border-slate-800'} p-3 max-w-[82%] text-xs shadow-md space-y-1">
                  ${m.image ? `<img src="${m.image}" class="rounded-xl max-h-48 object-cover w-full border border-slate-700 mb-1 cursor-pointer" onclick="window.open('${m.image}')">` : ''}
                  ${m.text ? `<p>${m.text}</p>` : ''}
                  <div class="flex justify-between items-center text-[9px] ${isUser ? 'text-blue-100' : 'text-slate-400'} mt-1">
                    <span>${m.time}</span>
                    <span>${isUser ? 'Delivered ✓✓' : 'Seen ✓✓'}</span>
                  </div>
                </div>
              </div>
            `;
          }).join('');
          body.scrollTop = body.scrollHeight;
        }
      } catch (err) { console.error(err); }
    }

    async function sendChatMessage(e) {
      e.preventDefault();
      const input = document.getElementById('chatInput');
      const text = input.value.trim();

      if (!text && !selectedImageBase64) return;

      const payload = { text, image: selectedImageBase64, sender: 'user' };
      input.value = '';
      selectedImageBase64 = null;
      document.getElementById('imagePreviewText').classList.add('hidden');

      await fetch('/api/support/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      loadMessages();
    }

    setInterval(loadMessages, 3000);
    loadMessages();
  </script>
</body>
</html>
