<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - CreativeEarn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0F172A] text-slate-100 min-h-screen font-sans pb-16">

  <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-40 flex justify-between items-center shadow-xl">
    <a href="/dashboard" class="text-xl font-black text-indigo-400">CreativeEarn</a>
    <div class="bg-slate-950 border border-slate-800 px-3.5 py-1.5 rounded-xl text-xs font-bold text-emerald-400">
      <i class="fa-solid fa-wallet text-amber-400"></i> <span id="userBalance">৳ 0</span>
    </div>
  </nav>

  <main class="max-w-md mx-auto p-4 space-y-6">
    <div id="dynamicCard" class="bg-slate-900 border border-slate-800 rounded-3xl p-6 text-center space-y-4 shadow-2xl">
      <p class="text-slate-400 text-sm animate-pulse">ডাটা লোড হচ্ছে...</p>
    </div>
  </main>

  <!-- 📸 ফেস ভেরিফিকেশন ক্যামেরা মোডাল -->
  <div id="faceModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-indigo-500/30 rounded-2xl p-5 max-w-sm w-full text-center space-y-4">
      <h3 class="text-base font-bold text-white"><i class="fa-solid fa-face-smile text-amber-400"></i> এআই ফেস ভেরিফিকেশন</h3>
      <div id="stepDesc" class="bg-indigo-950 p-2 rounded-xl text-amber-300 text-xs font-bold">ক্যামেরার সামনে সঠিকভাবে বসুন</div>
      <div class="relative w-44 h-44 mx-auto rounded-full overflow-hidden border-4 border-indigo-500">
        <video id="webcam" autoplay playsinline class="w-full h-full object-cover transform -scale-x-100"></video>
        <canvas id="canvas" class="hidden"></canvas>
      </div>
      <button onclick="startScanProcess()" class="w-full py-2.5 bg-emerald-600 font-bold rounded-xl text-xs text-white">স্ক্যান শুরু করুন</button>
      <button onclick="closeModal()" class="text-xs text-slate-400 underline block mx-auto">বাতিল</button>
    </div>
  </div>

  <script>
    let stream = null;

    function loadDashboard() {
      fetch('/api/user/dashboard-data')
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          const u = data.user;
          document.getElementById('userBalance').innerText = '৳ ' + u.balance;
          const card = document.getElementById('dynamicCard');

          if (!u.hasDeposited100) {
            card.innerHTML = `
              <div class="w-16 h-16 bg-amber-500/10 border border-amber-500/30 rounded-full flex items-center justify-center mx-auto text-amber-400 text-2xl"><i class="fa-solid fa-lock"></i></div>
              <h2 class="text-base font-black text-white">🔒 আপলোড ফিচারটি লক করা আছে</h2>
              <p class="text-xs text-slate-400">ভিডিও আপলোড করতে কমপক্ষে <b class="text-amber-400">১০০ টাকা ডিপোজিট</b> করুন।</p>
              <a href="/deposit" class="block w-full py-3 bg-amber-500 text-slate-950 font-black rounded-xl text-xs">💳 এখনই ১০০ টাকা ডিপোজিট করুন</a>
            `;
          } else if (u.hasDeposited100 && !u.isFaceVerified) {
            card.innerHTML = `
              <div class="w-16 h-16 bg-indigo-500/10 border border-indigo-500/30 rounded-full flex items-center justify-center mx-auto text-indigo-400 text-2xl animate-bounce"><i class="fa-solid fa-camera"></i></div>
              <h2 class="text-base font-black text-white">📸 ফেস ভেরিফাই আবশ্যক</h2>
              <p class="text-xs text-slate-300">আপনার ডিপোজিট এপ্রুভ হয়েছে! এবার ফেস স্ক্যান করে একাউন্ট আনলক করুন।</p>
              <button onclick="openCamera()" class="w-full py-3 bg-indigo-600 text-white font-black rounded-xl text-xs">📸 ফেস ভেরিফাই করুন</button>
            `;
          } else {
            card.innerHTML = `
              <div class="p-3 bg-emerald-950/40 border border-emerald-500/40 rounded-2xl flex items-center gap-3 text-left mb-3">
                <i class="fa-solid fa-circle-check text-emerald-400 text-2xl"></i>
                <div>
                  <h4 class="text-xs font-bold text-emerald-300">একাউন্ট ভেরিফাইড & আনলকড!</h4>
                  <p class="text-[10px] text-slate-400">আপনার ভিডিও সাবমিট করুন</p>
                </div>
              </div>
              <input type="file" id="vFile" accept="video/*" class="w-full text-xs bg-slate-950 p-2.5 rounded-xl border border-slate-800 text-slate-300">
              <div class="flex items-center gap-2 text-xs text-slate-400 text-left pt-2">
                <input type="checkbox" id="terms" class="rounded">
                <label for="terms">এটি আমার অরিজিনাল ভিডিও</label>
              </div>
              <button onclick="uploadVideo()" class="w-full py-3 bg-emerald-600 text-white font-black rounded-xl text-xs mt-3">ভিডিও সাবমিট করুন</button>
            `;
          }
        }
      });
    }

    async function openCamera() {
      document.getElementById('faceModal').classList.remove('hidden');
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('webcam').srcObject = stream;
      } catch(e) { alert("ক্যামেরা অন করা যায়নি!"); }
    }

    function closeModal() {
      if(stream) stream.getTracks().forEach(t=>t.stop());
      document.getElementById('faceModal').classList.add('hidden');
    }

    function startScanProcess() {
      const steps = ["স্থির থাকুন...", "মাথা একটু নাড়ান...", "চোখ পিটপিট করুন..."];
      let idx = 0;
      const interval = setInterval(() => {
        if(idx < steps.length) {
          document.getElementById('stepDesc').innerText = steps[idx++];
        } else {
          clearInterval(interval);
          finishScan();
        }
      }, 2000);
    }

    function finishScan() {
      const canvas = document.getElementById('canvas');
      const video = document.getElementById('webcam');
      canvas.width = video.videoWidth || 300; canvas.height = video.videoHeight || 300;
      canvas.getContext('2d').drawImage(video, 0, 0);

      fetch('/api/user/face-verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ faceImageData: canvas.toDataURL('image/jpeg') })
      }).then(res=>res.json()).then(d=>{
        alert(d.message); closeModal(); loadDashboard();
      });
    }

    function uploadVideo() {
      const file = document.getElementById('vFile').files[0];
      const terms = document.getElementById('terms').checked;
      if(!file) return alert('ভিডিও সিলেক্ট করুন!');
      if(!terms) return alert('টিক দিন!');

      const reader = new FileReader();
      reader.onload = function(e) {
        fetch('/api/upload-video', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fileName: file.name, fileData: e.target.result, termsAccepted: true })
        }).then(res=>res.json()).then(d=>{ alert(d.message); location.reload(); });
      };
      reader.readAsDataURL(file);
    }

    loadDashboard();
  </script>
</body>
</html>
