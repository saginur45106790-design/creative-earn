<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - CreativeEarn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0F172A] text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl space-y-6">
    <div class="text-center space-y-2">
      <div class="w-16 h-16 bg-amber-500/10 border border-amber-500/30 rounded-2xl flex items-center justify-center mx-auto text-amber-400 text-2xl">
        <i class="fa-solid fa-user-shield"></i>
      </div>
      <h2 class="text-xl font-black text-white">এডমিন প্যানেল লগইন</h2>
      <p class="text-xs text-slate-400">সিকিউরিটি পাসওয়ার্ড দিয়ে প্রবেশ করুন</p>
    </div>

    <form id="adminLoginForm" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-400 mb-1">এডমিন পাসওয়ার্ড</label>
        <input type="password" id="adminPass" required placeholder="পাসওয়ার্ড দিন" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white outline-none focus:border-amber-500">
      </div>

      <button type="submit" class="w-full py-3 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black rounded-xl shadow-lg transition">
        লগইন করুন
      </button>
    </form>
  </div>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('adminPass').value;

      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          // দুইটা কীতেই টোকেন সেভ করা হচ্ছে যাতে কখনো রিডাইরেক্ট না হয়
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('token', data.token);
          alert('🎉 এডমিন লগইন সফল হয়েছে!');
          window.location.href = '/admin';
        } else {
          alert(data.message);
        }
      })
      .catch(err => alert('সার্ভারে যোগাযোগ করতে সমস্যা হয়েছে!'));
    });
  </script>

</body>
</html>
