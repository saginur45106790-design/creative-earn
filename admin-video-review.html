<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ভিডিও রিভিউ - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans pb-12">

  <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-40">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <a href="/admin" class="text-xs text-amber-400 font-bold flex items-center gap-1.5"><i class="fa-solid fa-arrow-left"></i> ব্যাক টু এডমিন</a>
      <h1 class="text-sm font-black text-white">🎬 পেন্ডিং ভিডিও রিভিউসমূহ</h1>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto p-4 space-y-6">
    <section class="bg-slate-900 border border-slate-800 p-6 rounded-3xl space-y-4">
      <div class="flex justify-between items-center border-b border-slate-800 pb-3">
        <h2 class="text-sm font-bold text-amber-400 flex items-center gap-2"><i class="fa-solid fa-video"></i> ভিডিও তালিকা</h2>
        <span id="pendingBadge" class="bg-amber-500/20 text-amber-300 border border-amber-500/30 text-xs px-2.5 py-0.5 rounded-full font-bold">০টি</span>
      </div>

      <div id="pendingVideoList" class="space-y-4">
        <p class="text-xs text-slate-500 text-center py-6">লোডিং হচ্ছে...</p>
      </div>
    </section>
  </main>

  <script>
    function getAdminHeader() {
      return {
        'Content-Type': 'application/json',
        'Authorization': localStorage.getItem('adminToken') || ''
      };
    }

    async function loadPendingVideos() {
      const container = document.getElementById('pendingVideoList');
      const badge = document.getElementById('pendingBadge');

      const res = await fetch('/api/admin/pending-videos', { headers: getAdminHeader() });
      const data = await res.json();

      if (data.status === 'success' && data.videos.length > 0) {
        badge.innerText = `${data.videos.length}টি`;
        container.innerHTML = data.videos.map(v => `
          <div id="card_${v.id}" class="bg-slate-950 border border-slate-800 p-5 rounded-2xl space-y-3 transition-all duration-300">
            <div class="flex justify-between items-start flex-wrap gap-2 border-b border-slate-800 pb-2">
              <div>
                <h3 class="text-sm font-bold text-white">${v.userName}</h3>
                <p class="text-xs text-slate-400">ফোন: <b class="text-slate-200">${v.userPhone}</b> | ক্যাটাগরি: <b class="text-indigo-300">${v.category}</b></p>
              </div>
              <a href="${v.fileUrl}" download class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-3 py-1.5 rounded-xl transition flex items-center gap-1.5">
                <i class="fa-solid fa-download"></i> Download
              </a>
            </div>

            <div class="rounded-2xl overflow-hidden bg-black max-h-64 flex justify-center">
              <video src="${v.fileUrl}" controls class="max-h-64 w-auto rounded-xl"></video>
            </div>

            <div class="grid grid-cols-2 gap-2 pt-2">
              <div>
                <label class="block text-[10px] text-slate-400 mb-1">রেটিং (%)</label>
                <input type="number" id="rating_${v.id}" placeholder="85" class="w-full bg-slate-900 border border-slate-800 p-2 rounded-xl text-xs text-amber-400 font-bold focus:outline-none">
              </div>
              <div>
                <label class="block text-[10px] text-slate-400 mb-1">রিওয়ার্ড অ্যামাউন্ট (৳)</label>
                <input type="number" id="amount_${v.id}" placeholder="50" class="w-full bg-slate-900 border border-slate-800 p-2 rounded-xl text-xs text-emerald-400 font-bold focus:outline-none">
              </div>
            </div>

            <div class="flex gap-2 pt-1">
              <button onclick="reviewVideo('${v.id}', 'Approved')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-xl text-xs transition">Approve & Pay</button>
              <button onclick="reviewVideo('${v.id}', 'Rejected')" class="bg-rose-600 hover:bg-rose-500 text-white font-bold px-5 py-2.5 rounded-xl text-xs transition">Reject</button>
            </div>
          </div>
        `).join('');
      } else {
        badge.innerText = '০টি';
        container.innerHTML = '<p class="text-center py-6 text-slate-500 text-xs">কোনো ভিডিও রিভিউ পেন্ডিং নেই!</p>';
      }
    }

    async function reviewVideo(id, status) {
      const rating = document.getElementById(`rating_${id}`)?.value || 0;
      const amount = document.getElementById(`amount_${id}`)?.value || 0;

      const res = await fetch('/api/admin/review-video', {
        method: 'POST',
        headers: getAdminHeader(),
        body: JSON.stringify({ id, status, rating, amount })
      });
      const data = await res.json();
      if (data.status === 'success') {
        const card = document.getElementById(`card_${id}`);
        if (card) {
          card.style.opacity = '0';
          card.style.transform = 'scale(0.9)';
          setTimeout(() => { card.remove(); loadPendingVideos(); }, 300);
        }
      }
    }

    loadPendingVideos();
  </script>
</body>
</html>
