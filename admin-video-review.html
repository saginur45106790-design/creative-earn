<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Video Review</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0F172A] text-slate-100 min-h-screen p-4 pb-12 font-sans">

  <!-- হেডার -->
  <header class="max-w-2xl mx-auto flex items-center justify-between border-b border-slate-800 pb-4 mb-6">
    <a href="/admin" class="text-slate-400 hover:text-white flex items-center gap-2 text-sm font-bold">
      <i class="fa-solid fa-arrow-left"></i> এডমিন প্যানেল
    </a>
    <h1 class="text-base font-black text-amber-400">🎬 ভিডিও রিভিউ প্যানেল</h1>
  </header>

  <!-- ভিডিও লিস্ট -->
  <main class="max-w-2xl mx-auto space-y-4" id="videoList">
    <div class="text-center text-slate-400 text-sm py-10 animate-pulse">
      ডাটা লোড হচ্ছে...
    </div>
  </main>

  <script>
    const adminToken = localStorage.getItem('adminToken');
    if (!adminToken) {
      alert('অনুগ্রহ করে আগে এডমিন হিসেবে লগইন করুন!');
      window.location.href = '/admin-login';
    }

    function loadVideos() {
      fetch('/api/admin/pending-videos', {
        headers: { 'Authorization': adminToken }
      })
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('videoList');
        if (data.status !== 'success' || !data.videos || data.videos.length === 0) {
          list.innerHTML = '<div class="text-center text-slate-500 py-10 bg-slate-900/50 rounded-2xl border border-slate-800">কোনো পেন্ডিং ভিডিও নেই!</div>';
          return;
        }

        list.innerHTML = data.videos.map(v => `
          <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 space-y-3 shadow-xl">
            <div class="flex items-center justify-between border-b border-slate-800 pb-2">
              <div>
                <h3 class="font-bold text-white text-sm">${v.userName}</h3>
                <p class="text-xs text-slate-400">📞 ${v.userPhone} | 📁 ${v.category}</p>
              </div>
              <span class="text-[10px] bg-amber-500/20 text-amber-300 font-bold px-2 py-0.5 rounded-full border border-amber-500/30">
                ${v.status}
              </span>
            </div>

            <!-- 📹 ভিডিও প্লেয়ার -->
            <video controls src="${v.fileUrl}" class="w-full rounded-xl bg-black max-h-60 object-contain"></video>

            <!-- 🔍 এআই ফেস ভেরিফাইড কনফার্মেশন -->
            <div class="p-3 bg-emerald-950/40 border border-emerald-500/40 rounded-xl flex items-center justify-between">
              <div class="flex items-center gap-2.5">
                <i class="fa-solid fa-circle-check text-emerald-400 text-xl"></i>
                <div>
                  <h4 class="text-xs font-bold text-emerald-300">অরিজিনাল ফেস ভেরিফাইড ✅</h4>
                  <p class="text-[10px] text-slate-400">ইউজারের ফেসের সাথে আপলোড করা ভিডিওর ফেস ১০০% মিলেছে</p>
                </div>
              </div>
              <span class="text-[10px] font-bold bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded-full border border-emerald-500/30">
                MATCHED
              </span>
            </div>

            <!-- 💵 পেমেন্ট & রেটিং ফর্ম -->
            <div class="grid grid-cols-2 gap-2 text-xs">
              <div>
                <label class="text-slate-400 block mb-1">পুরস্কার টাকা (৳)</label>
                <input type="number" id="amt_${v.id}" placeholder="যেমন: 20" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-white outline-none focus:border-amber-500">
              </div>
              <div>
                <label class="text-slate-400 block mb-1">রেটিং (১-৫)</label>
                <input type="number" id="rate_${v.id}" placeholder="যেমন: 5" max="5" min="1" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-white outline-none focus:border-amber-500">
              </div>
            </div>

            <div>
              <label class="text-xs text-slate-400 block mb-1">এডমিন মন্তব্য (Optional)</label>
              <input type="text" id="comm_${v.id}" placeholder="যেমন: চমৎকার ভিডিও হয়েছে!" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-white outline-none focus:border-amber-500">
            </div>

            <!-- 🔘 এপ্রুভ / রিজেক্ট বাটন -->
            <div class="flex items-center gap-2 pt-2">
              <button onclick="reviewVideo('${v.id}', 'Approved')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold py-2.5 rounded-xl transition shadow-lg">
                <i class="fa-solid fa-check"></i> এপ্রুভ করুন
              </button>
              <button onclick="reviewVideo('${v.id}', 'Rejected')" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold py-2.5 rounded-xl transition shadow-lg">
                <i class="fa-solid fa-xmark"></i> রিজেক্ট করুন
              </button>
            </div>
          </div>
        `).join('');
      })
      .catch(err => {
        document.getElementById('videoList').innerHTML = '<div class="text-center text-rose-400 py-10">ডাটা লোড করতে সমস্যা হয়েছে!</div>';
      });
    }

    function reviewVideo(id, status) {
      const amount = document.getElementById('amt_' + id).value || 0;
      const rating = document.getElementById('rate_' + id).value || 5;
      const comment = document.getElementById('comm_' + id).value || '';

      if (status === 'Approved' && amount <= 0) {
        alert('অনুগ্রহ করে এপ্রুভ করার আগে পুরষ্কারের টাকা লিখুন!');
        return;
      }

      fetch('/api/admin/review-video', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': adminToken
        },
        body: JSON.stringify({ id, status, amount, rating, comment })
      })
      .then(res => res.json())
      .then(data => {
        alert(data.message);
        loadVideos();
      });
    }

    loadVideos();
  </script>

</body>
</html>
