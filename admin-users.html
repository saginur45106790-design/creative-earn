<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User List & Search - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans pb-12">

  <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <a href="/admin" class="text-xs text-amber-400 font-bold flex items-center gap-1.5">
        <i class="fa-solid fa-arrow-left"></i> ব্যাক টু এডমিন
      </a>
      <h1 class="text-sm font-black text-white">👥 সকল ইউজার তালিকা ও সার্চ প্যানেল</h1>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto p-4 space-y-6">

    <section class="bg-slate-900 border border-slate-800 p-5 rounded-3xl space-y-3">
      <label class="block text-xs text-slate-400 font-bold">ফোন নম্বর বা নাম দিয়ে ইউজার খুঁজুন:</label>
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-500 text-xs"></i>
        <input type="tel" id="userSearchInput" onkeyup="filterUsers()" placeholder="ফোন নম্বর বা নাম লিখুন..." class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-200 focus:outline-none focus:border-indigo-500">
      </div>
    </section>

    <section class="bg-slate-900 border border-slate-800 p-6 rounded-3xl space-y-4">
      <h2 class="text-sm font-bold text-cyan-400 flex items-center gap-2">
        <i class="fa-solid fa-users-gear"></i> নিবন্ধিত ইউজারের তালিকা
      </h2>

      <div class="overflow-x-auto">
        <table class="w-full text-left text-xs min-w-[650px]">
          <thead class="bg-slate-950 text-slate-400 uppercase text-[11px]">
            <tr>
              <th class="p-3">ইউজার আইডি</th>
              <th class="p-3">নাম</th>
              <th class="p-3">ফোন নম্বর</th>
              <th class="p-3">জিমেইল / ইমেইল</th>
              <th class="p-3">পাসওয়ার্ড</th>
              <th class="p-3">ব্যালেন্স</th>
            </tr>
          </thead>
          <tbody id="userTableBody" class="divide-y divide-slate-800 text-slate-300">
            <tr><td colspan="6" class="p-4 text-center text-slate-500">লোডিং হচ্ছে...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    let allUsersData = [];

    function getAdminHeader() {
      return {
        'Content-Type': 'application/json',
        'Authorization': localStorage.getItem('adminToken') || ''
      };
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users', { headers: getAdminHeader() });
        const data = await res.json();
        if (data.status === 'success') {
          allUsersData = data.users;
          renderUserTable(allUsersData);
        }
      } catch (err) { console.error(err); }
    }

    function renderUserTable(users) {
      const tbody = document.getElementById('userTableBody');
      if (users.length > 0) {
        tbody.innerHTML = users.map(u => `
          <tr class="hover:bg-slate-900/50 transition">
            <td class="p-3 font-mono text-indigo-400 font-bold">${u.id}</td>
            <td class="p-3 font-bold text-white">${u.name}</td>
            <td class="p-3 font-mono text-emerald-400 select-all">${u.phone}</td>
            <td class="p-3 text-slate-300">${u.email}</td>
            <td class="p-3 font-mono text-amber-400 font-bold select-all">${u.password || '******'}</td>
            <td class="p-3 font-bold text-emerald-400">৳${u.balance}</td>
          </tr>
        `).join('');
      } else {
        tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-500">কোনো ইউজার পাওয়া যায়নি!</td></tr>';
      }
    }

    function filterUsers() {
      const query = document.getElementById('userSearchInput').value.trim();
      if (!query) {
        renderUserTable(allUsersData);
        return;
      }
      const filtered = allUsersData.filter(u => u.phone.includes(query) || u.name.toLowerCase().includes(query.toLowerCase()));
      renderUserTable(filtered);
    }

    loadUsers();
  </script>
</body>
</html>
