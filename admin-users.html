<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - User Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0F172A] text-slate-100 min-h-screen p-4 pb-12 font-sans">

  <div class="max-w-2xl mx-auto space-y-5">
    <header class="flex items-center justify-between border-b border-slate-800 pb-4">
      <a href="/admin" class="text-slate-400 text-xs font-bold flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> এডমিন ড্যাশবোর্ড
      </a>
      <h1 class="text-sm font-black text-amber-400">👥 ইউজার ডাটাবেজ & সার্চ</h1>
    </header>

    <!-- 🔍 ফোন নম্বর ও আইডি দিয়ে সার্চ বার -->
    <div class="relative">
      <input type="text" id="searchInput" oninput="searchUsers()" placeholder="🔍 ইউজার ফোন নম্বর বা আইডি লিখে সার্চ করুন..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-3.5 pl-4 text-xs text-white outline-none focus:border-amber-500 shadow-xl">
    </div>

    <!-- ইউজার লিস্ট -->
    <div id="usersContainer" class="space-y-4">
      <p class="text-center text-slate-500 text-xs py-10 animate-pulse">ডাটা লোড হচ্ছে...</p>
    </div>
  </div>

  <script>
    const adminToken = localStorage.getItem('adminToken') || localStorage.getItem('token');

    function fetchUsers(query = '') {
      fetch('/api/admin/users?search=' + encodeURIComponent(query), {
        headers: { 'Authorization': adminToken }
      })
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('usersContainer');
        if (!data.users || data.users.length === 0) {
          container.innerHTML = '<div class="text-center text-slate-500 py-10 bg-slate-900 rounded-2xl border border-slate-800 text-xs">কোনো ইউজার পাওয়া যায়নি!</div>';
          return;
        }

        container.innerHTML = data.users.map(u => `
          <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 space-y-3 shadow-2xl">
            <div class="flex justify-between items-start border-b border-slate-800 pb-3">
              <div>
                <h3 class="font-black text-white text-sm flex items-center gap-2">
                  ${u.name} 
                  <span class="text-[10px] px-2 py-0.5 rounded-full ${u.isFaceVerified ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-amber-500/20 text-amber-300 border border-amber-500/30'}">
                    ${u.isFaceVerified ? 'Verified ✅' : 'Unverified ⚠️'}
                  </span>
                </h3>
                <p class="text-xs text-slate-400 font-mono mt-0.5">📞 ${u.phone} | 🆔 ${u.id}</p>
                <p class="text-[11px] text-slate-500">📧 ${u.email}</p>
              </div>
              <div class="text-right">
                <span class="text-xs font-black text-amber-400 bg-slate-950 px-3 py-1 rounded-xl border border-slate-800 block">৳ ${u.balance}</span>
                <button onclick="editBalance('${u.phone}', ${u.balance})" class="text-[10px] text-indigo-400 underline block mt-1">ব্যালেন্স এডিট</button>
              </div>
            </div>

            <!-- বিস্তারিত তথ্য -->
            <div class="grid grid-cols-2 gap-2 text-[11px] bg-slate-950 p-3 rounded-2xl border border-slate-800">
              <div><span class="text-slate-500">১০০৳ ডিপোজিট:</span> <b class="${u.hasDeposited100 ? 'text-emerald-400' : 'text-rose-400'}">${u.hasDeposited100 ? 'সম্পন্ন' : 'বাকি'}</b></div>
              <div><span class="text-slate-500">রেফারেল কোড:</span> <b class="text-amber-300 font-mono">${u.refCode}</b></div>
              <div><span class="text-slate-500">যার রেফারে আসা:</span> <b class="text-slate-300 font-mono">${u.referredBy || 'None'}</b></div>
              <div><span class="text-slate-500">রেফারেল ইনকাম:</span> <b class="text-emerald-400">৳ ${u.referralEarnings}</b></div>
            </div>
          </div>
        `).join('');
      });
    }

    function searchUsers() {
      const query = document.getElementById('searchInput').value;
      fetchUsers(query);
    }

    function editBalance(phone, currentBal) {
      Swal.fire({
        title: 'ব্যালেন্স পরিবর্তন করুন',
        text: `ইউজার নম্বর: ${phone}`,
        input: 'number',
        inputValue: currentBal,
        background: '#1e293b',
        color: '#fff',
        showCancelButton: true,
        confirmButtonColor: '#6366f1',
        cancelButtonColor: '#ef4444',
        confirmButtonText: 'সেভ করুন'
      }).then((result) => {
        if (result.isConfirmed && result.value !== '') {
          fetch('/api/admin/update-user-balance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': adminToken },
            body: JSON.stringify({ phone, newBalance: result.value })
          })
          .then(res => res.json())
          .then(data => {
            Swal.fire({ icon: 'success', title: 'সফল!', text: data.message, background: '#1e293b', color: '#fff', timer: 1500, showConfirmButton: false });
            fetchUsers(document.getElementById('searchInput').value);
          });
        }
      });
    }

    fetchUsers();
  </script>
</body>
</html>
